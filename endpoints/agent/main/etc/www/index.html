<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数场服务器管理系统</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/vue@2.6.14/dist/vue.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        :root {
            --primary: #1a73e8;
            --primary-dark: #0d47a1;
            --secondary: #26c6da;
            --success: #4caf50;
            --warning: #ff9800;
            --danger: #f44336;
            --dark: #121826;
            --dark-card: #1e293b;
            --dark-text: #e2e8f0;
            --light-text: #94a3b8;
            --border: #2d3748;
            --sidebar-width: 260px;
            --header-height: 70px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--dark);
            color: var(--dark-text);
            line-height: 1.6;
            overflow-x: hidden;
        }

        p {
            word-break: break-word;
        }

        .app-container {
            display: flex;
            min-height: 100vh;
        }

        /* 侧边导航样式 */
        .sidebar {
            width: var(--sidebar-width);
            background-color: rgba(18, 24, 38, 0.95);
            border-right: 1px solid var(--border);
            position: fixed;
            height: 100vh;
            z-index: 100;
            overflow-y: auto;
            transition: transform 0.3s ease;
        }

        .logo {
            display: flex;
            align-items: center;
            padding: 20px;
            border-bottom: 1px solid var(--border);
        }

        .logo-icon {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .logo-text {
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .menu {
            padding: 20px 10px;
        }

        .menu-item {
            display: flex;
            align-items: center;
            padding: 14px 16px;
            margin: 8px 0;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            color: var(--light-text);
            font-weight: 500;
        }

        .menu-item:hover {
            background-color: rgba(26, 115, 232, 0.15);
            color: var(--primary);
        }

        .menu-item.active {
            background: linear-gradient(90deg, rgba(26, 115, 232, 0.25), transparent);
            color: var(--primary);
            border-left: 4px solid var(--primary);
        }

        .menu-item i {
            margin-right: 12px;
            font-size: 20px;
            width: 24px;
            text-align: center;
        }

        .menu-text {
            font-size: 16px;
        }

        /* 主内容区样式 */
        .main-content {
            flex: 1;
            margin-left: var(--sidebar-width);
            padding: 0;
            min-height: 100vh;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
            height: var(--header-height);
            background-color: rgba(18, 24, 38, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 99;
        }

        .page-title {
            font-size: 24px;
            font-weight: 600;
            display: flex;
            align-items: center;
        }

        .page-title i {
            margin-right: 12px;
            color: var(--secondary);
        }

        .user-info {
            display: flex;
            align-items: center;
        }

        .notification {
            position: relative;
            margin-right: 20px;
            font-size: 18px;
            cursor: pointer;
        }

        .notification-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background-color: var(--danger);
            color: white;
            font-size: 10px;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .user-avatar {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        /* 内容容器 */
        .content-container {
            padding: 30px;
            padding-bottom: 50px;
        }

        /* 卡片样式 */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(640px, 1fr));
            gap: 24px;
            margin-bottom: 30px;
        }

        .card {
            background-color: var(--dark-card);
            border-radius: 14px;
            padding: 24px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s, box-shadow 0.3s;
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 20px rgba(0, 0, 0, 0.25);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .card-title {
            font-size: 18px;
            font-weight: 600;
            display: flex;
            align-items: center;
        }

        .card-title i {
            margin-right: 10px;
            color: var(--secondary);
        }

        .card-badge {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
        }

        .badge-success {
            background-color: rgba(76, 175, 80, 0.15);
            color: var(--success);
        }

        .badge-danger {
            background-color: rgba(244, 67, 54, 0.15);
            color: var(--danger);
        }

        .badge-warning {
            background-color: rgba(255, 152, 0, 0.15);
            color: var(--warning);
        }

        /* 图表容器 */
        .chart-container {
            width: 100%;
            height: 300px;
        }

        /* 表格样式 */
        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background-color: rgba(30, 41, 59, 0.5);
            border-radius: 10px;
            overflow: hidden;
        }

        .data-table th {
            text-align: left;
            padding: 16px 20px;
            font-weight: 600;
            color: var(--light-text);
            background-color: rgba(30, 41, 59, 0.8);
            border-bottom: 1px solid var(--border);
        }

        .data-table td {
            padding: 14px 20px;
            border-bottom: 1px solid var(--border);
        }

        .data-table tr:last-child td {
            border-bottom: none;
        }

        .data-table tr:hover {
            background-color: rgba(26, 115, 232, 0.05);
        }

        /* 状态指示器 */
        .status-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 8px;
        }

        .status-success {
            background-color: var(--success);
            box-shadow: 0 0 8px rgba(76, 175, 80, 0.5);
        }

        .status-danger {
            background-color: var(--danger);
            box-shadow: 0 0 8px rgba(244, 67, 54, 0.5);
        }

        .status-warning {
            background-color: var(--warning);
            box-shadow: 0 0 8px rgba(255, 152, 0, 0.5);
        }

        /* 按钮样式 */
        .btn {
            padding: 10px 18px;
            border-radius: 8px;
            border: none;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn i {
            font-size: 16px;
        }

        .btn-sm {
            padding: 8px 14px;
            font-size: 14px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            box-shadow: 0 4px 6px rgba(26, 115, 232, 0.3);
        }

        .btn-primary:hover {
            box-shadow: 0 6px 10px rgba(26, 115, 232, 0.4);
            transform: translateY(-2px);
        }

        .btn-outline {
            background-color: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
        }

        .btn-outline:hover {
            background-color: rgba(26, 115, 232, 0.1);
        }

        .btn-success {
            background: linear-gradient(135deg, var(--success), #2e7d32);
            color: white;
            box-shadow: 0 4px 6px rgba(76, 175, 80, 0.3);
        }

        .btn-success:hover {
            box-shadow: 0 6px 10px rgba(76, 175, 80, 0.4);
            transform: translateY(-2px);
        }

        /* 密钥卡片样式 */
        .key-card {
            background: linear-gradient(135deg, rgba(26, 115, 232, 0.1), rgba(38, 198, 218, 0.1));
            border-radius: 10px;
            padding: 20px;
            margin: 20px 0;
            border: 1px solid rgba(26, 115, 232, 0.3);
        }

        .key-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .key-title {
            font-weight: 600;
            font-size: 17px;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .key-title i {
            font-size: 20px;
        }

        .key-value {
            font-family: monospace;
            word-break: break-all;
            margin: 15px 0;
            padding: 15px;
            background-color: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            max-height: 120px;
            overflow-y: auto;
            line-height: 1.8;
            font-size: 14px;
        }

        .key-actions {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .key-info {
            font-size: 14px;
            color: var(--light-text);
        }

        /* 表单样式 */
        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--light-text);
        }

        .form-control {
            width: 100%;
            padding: 12px 16px;
            background-color: rgba(30, 41, 59, 0.5);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--dark-text);
            font-size: 15px;
            transition: border 0.3s;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(26, 115, 232, 0.2);
        }

        /* 分页 */
        .pagination {
            display: flex;
            justify-content: center;
            margin-top: 30px;
            gap: 10px;
        }

        .page-item {
            padding: 8px 16px;
            border-radius: 6px;
            background-color: var(--dark-card);
            cursor: pointer;
            transition: all 0.3s;
        }

        .page-item:hover {
            background-color: rgba(26, 115, 232, 0.1);
        }

        .page-item.active {
            background-color: var(--primary);
            color: white;
        }

        /* 响应式调整 */
        @media (max-width: 1200px) {
            .card-grid {
                grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            }
        }

        @media (max-width: 992px) {
            .sidebar {
                transform: translateX(-100%);
                width: 280px;
            }

            .sidebar.active {
                transform: translateX(0);
            }

            .main-content {
                margin-left: 0;
            }

            .mobile-toggle {
                display: block;
                position: fixed;
                top: 20px;
                left: 20px;
                z-index: 101;
                background: var(--primary);
                color: white;
                width: 40px;
                height: 40px;
                border-radius: 8px;
                display: flex;
                align-items: center;
                justify-content: center;
                box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            }
        }

        @media (max-width: 768px) {
            .header {
                padding: 0 20px;
            }

            .content-container {
                padding: 20px;
            }

            .card-grid {
                grid-template-columns: 1fr;
            }

            .key-actions {
                flex-direction: column;
                align-items: flex-start;
            }
        }

        @media (max-width: 576px) {
            .header {
                flex-direction: column;
                height: auto;
                padding: 15px;
            }

            .page-title {
                margin-bottom: 15px;
            }
        }

        /* 页面切换动画 */
        .page-enter-active, .page-leave-active {
            transition: opacity 0.3s, transform 0.3s;
        }

        .page-enter, .page-leave-to {
            opacity: 0;
            transform: translateY(20px);
        }

        /* 页面标题 */
        .section-title {
            font-size: 22px;
            margin: 30px 0 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .section-title i {
            color: var(--secondary);
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- 移动端菜单开关 -->
        <div class="mobile-toggle" @click="toggleSidebar">
            <i class="fas fa-bars"></i>
        </div>

        <div class="app-container">
            <!-- 侧边导航 -->
            <div class="sidebar" :class="{active: sidebarActive}">
                <div class="logo">
                    <div class="logo-icon">
                        <i class="fas fa-shield-alt"></i>
                    </div>
                    <div class="logo-text">数场服务器</div>
                </div>

                <div class="menu">
                    <div
                        v-for="(item, index) in menuItems"
                        :key="index"
                        class="menu-item"
                        :class="{active: activePage === item.component}"
                        @click="switchPage(item.component)"
                    >
                        <i :class="item.icon"></i>
                        <span class="menu-text">{{ item.name }}</span>
                    </div>
                </div>
            </div>

            <!-- 主内容区 -->
            <div class="main-content">
                <div class="header">
                    <div class="page-title">
                        <i :class="currentPageIcon"></i>
                        {{ currentPageTitle }}
                    </div>
                    <div class="user-info">
                        <div class="notification">
                            <i class="fas fa-bell"></i>
                            <div class="notification-badge">3</div>
                        </div>
                        <div class="user-avatar">管理员</div>
                    </div>
                </div>

                <!-- 内容容器 -->
                <div class="content-container">
                    <transition name="page" mode="out-in">
                        <component :is="activePage"></component>
                    </transition>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 仪表盘组件
        const Dashboard = {
            template: `
                <div>
                    <h2 class="section-title">
                        <i class="fas fa-tachometer-alt"></i>
                        安全状态看板
                    </h2>
                    <div class="card-grid">
                        <div class="card">
                            <div class="card-header">
                                <div class="card-title">
                                    <i class="fas fa-server"></i>
                                    容器安全状态
                                </div>
                                <div class="card-badge badge-success">安全</div>
                            </div>
                            <p>最新检测时间: {{ currentTime }}</p>
                        </div>

                        <div class="card">
                            <div class="card-header">
                                <div class="card-title">
                                    <i class="fas fa-database"></i>
                                    NHP服务器认证
                                </div>
                                <div class="card-badge badge-success">可信</div>
                            </div>
                            <p>最新认证时间: {{ currentTime }}</p>
                        </div>

                        <div class="card">
                            <div class="card-header">
                                <div class="card-title">
                                    <i class="fas fa-exchange-alt"></i>
                                    数据资源提供方认证
                                </div>
                                <div class="card-badge badge-danger">不可信</div>
                            </div>
                            <p>数据资源ID: 0786584e-9107-49db-943a-9643492935f7</p>
                            <p>数据资源提供方公钥: 未知</p>
                        </div>
                        <div class="card">
                            <div class="card-header">
                                <div class="card-title">
                                    <i class="fas fa-exchange-alt"></i>
                                    数据资源提供方认证
                                </div>
                                <div class="card-badge badge-success">可信</div>
                            </div>
                            <p>数据资源ID: 022cd3e5-2074-4898-a654-ae85d809d4fb, 7321fef8-2da3-4c3f-a3ba-98d32c0522cb</p>
                            <p>数据资源提供方公钥: eS0vIogdu6hIN4ke3abWuGaLHbdj7FuWsAKUMtnopxgNQP6FS684VLd4Bbni6NcYrKqAIMEyz+vzxo9wInMe7w==</p>
                            <p>最新认证时间: {{ currentTime }}</p>
                        </div>
                    </div>

                    <h2 class="section-title">
                        <i class="fas fa-chart-line"></i>
                        资源实时监控
                    </h2>
                    <div class="card-grid">
                        <div class="card">
                            <div class="card-header">
                                <div class="card-title">
                                    <i class="fas fa-microchip"></i>
                                    CPU/内存/存储使用率
                                </div>
                                <div class="key-info">更新于: {{ currentTime }}</div>
                            </div>
                            <div class="chart-container" id="resourceChart"></div>
                        </div>

                        <div class="card">
                            <div class="card-header">
                                <div class="card-title">
                                    <i class="fas fa-network-wired"></i>
                                    网络I/O流量
                                </div>
                                <div class="key-info">更新于: {{ currentTime }}</div>
                            </div>
                            <div class="chart-container" id="networkChart"></div>
                        </div>
                    </div>
                </div>
            `,
            data() {
                return {
                    currentTime: '',
                    resourceChart: null,
                    networkChart: null,
                    resourceTimer: null,
                    networkTimer: null
                };
            },
            mounted() {
                this.updateTime();
                setInterval(this.updateTime, 1000);
                this.initCharts();

                // 模拟数据更新
                this.resourceTimer = setInterval(this.updateResourceChart, 5000);
                this.networkTimer = setInterval(this.updateNetworkChart, 3000);
            },
            beforeDestroy() {
                clearInterval(this.resourceTimer);
                clearInterval(this.networkTimer);
            },
            methods: {
                updateTime() {
                    const now = new Date();
                    this.currentTime = now.toLocaleTimeString();
                },
                initCharts() {
                    // 资源使用率图表
                    this.resourceChart = echarts.init(document.getElementById('resourceChart'));
                    this.updateResourceChart();

                    // 网络流量图表
                    this.networkChart = echarts.init(document.getElementById('networkChart'));
                    this.updateNetworkChart();

                    // 响应式调整
                    window.addEventListener('resize', () => {
                        this.resourceChart.resize();
                        this.networkChart.resize();
                    });
                },
                updateResourceChart() {
                    const now = new Date();
                    const minutes = now.getMinutes();
                    const seconds = now.getSeconds();
                    const baseTime = `${now.getHours()}:${minutes < 10 ? '0' + minutes : minutes}`;

                    const option = {
                        tooltip: {
                            trigger: 'axis',
                            backgroundColor: 'rgba(30, 41, 59, 0.9)',
                            borderColor: 'rgba(26, 115, 232, 0.5)',
                            textStyle: {
                                color: '#e2e8f0'
                            }
                        },
                        legend: {
                            data: ['CPU', '内存', '存储'],
                            textStyle: {
                                color: '#e2e8f0'
                            },
                            right: 10,
                            top: 10
                        },
                        grid: {
                            left: '3%',
                            right: '4%',
                            bottom: '3%',
                            containLabel: true
                        },
                        xAxis: {
                            type: 'category',
                            boundaryGap: false,
                            data: Array.from({length: 7}, (_, i) => {
                                const min = (minutes - 6 + i) % 60;
                                return `${now.getHours()}:${min < 10 ? '0' + min : min}`;
                            }),
                            axisLine: {
                                lineStyle: {
                                    color: '#94a3b8'
                                }
                            }
                        },
                        yAxis: {
                            type: 'value',
                            max: 100,
                            axisLine: {
                                lineStyle: {
                                    color: '#94a3b8'
                                }
                            },
                            splitLine: {
                                lineStyle: {
                                    color: 'rgba(148, 163, 184, 0.1)'
                                }
                            }
                        },
                        series: [
                            {
                                name: 'CPU',
                                type: 'line',
                                smooth: true,
                                data: Array.from({length: 7}, () => Math.floor(Math.random() * 30) + 40),
                                lineStyle: {
                                    color: '#1a73e8',
                                    width: 3
                                },
                                symbol: 'circle',
                                symbolSize: 8,
                                itemStyle: {
                                    color: '#1a73e8'
                                }
                            },
                            {
                                name: '内存',
                                type: 'line',
                                smooth: true,
                                data: Array.from({length: 7}, () => Math.floor(Math.random() * 20) + 20),
                                lineStyle: {
                                    color: '#26c6da',
                                    width: 3
                                },
                                symbol: 'circle',
                                symbolSize: 8,
                                itemStyle: {
                                    color: '#26c6da'
                                }
                            },
                            {
                                name: '存储',
                                type: 'line',
                                smooth: true,
                                data: Array.from({length: 7}, () => Math.floor(Math.random() * 10) + 60),
                                lineStyle: {
                                    color: '#4caf50',
                                    width: 3
                                },
                                symbol: 'circle',
                                symbolSize: 8,
                                itemStyle: {
                                    color: '#4caf50'
                                }
                            }
                        ]
                    };
                    this.resourceChart.setOption(option);
                },
                updateNetworkChart() {
                    const now = new Date();
                    const minutes = now.getMinutes();
                    const seconds = now.getSeconds();
                    const baseTime = `${now.getHours()}:${minutes < 10 ? '0' + minutes : minutes}`;

                    const option = {
                        tooltip: {
                            trigger: 'axis',
                            backgroundColor: 'rgba(30, 41, 59, 0.9)',
